<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Restaurant Ordering System</title>
    <link rel="icon" type="image/jpeg" href="Gradient-catering-logo-template-on-transparent-background-PNG.jpg">
    <link rel="stylesheet" href="restaurant-styles.css">
</head>
<body>
    <div class="container">
        <div class="order-card">
            <h1>🍽️ AURA RESTAURANT 🍽️ </h1>
           
            
            <form id="orderForm">
                <div class="form-group">
                    <label for="customerName">Customer Name:</label>
                    <input 
                        type="text" 
                        id="customerName" 
                        placeholder="Enter your name"
                        required
                    >
                </div>

                <div class="form-group">
                    <label for="foodSelect">Select Food:</label>
                    <select id="foodSelect" required>
                        <option value="">-- Choose an item --</option>
                    </select>
                </div>

                <button type="button" id="orderBtn" class="order-btn">Place Order</button>
            </form>

            <div id="menuDisplay" class="menu-display">
                <h3>Available Menu Items:</h3>
                <ul id="menuList"></ul>
            </div>

            <div id="orderResult" class="order-result hidden">
                <h2>Order Summary</h2>
                <div class="result-item">
                    <span class="label">Customer:</span>
                    <span id="displayCustomer" class="value"></span>
                </div>
                <div class="result-item">
                    <span class="label">Food:</span>
                    <span id="displayFood" class="value"></span>
                </div>
                <div class="result-item">
                    <span class="label">Price:</span>
                    <span id="displayPrice" class="value"></span>
                </div>
                <div class="result-item delivery">
                    <span class="label">Delivery:</span>
                    <span id="displayDelivery" class="value"></span>
                </div>
            </div>
        </div>
    </div>

    <script src="restaurant-script.js"></script>
</body>
</html>
